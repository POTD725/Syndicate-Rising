name: Syndicate Rising Browser Build and Pages Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - ".deployment-status.json"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: syndicate-rising-pages-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-web:
    runs-on: ubuntu-latest
    env:
      GODOT_VERSION: 4.3-stable
      TEMPLATE_VERSION: 4.3.stable
      GODOT_BINARY: Godot_v4.3-stable_linux.x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Install Godot and templates
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p .ci/godot
          curl --fail --location --retry 3 \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip" \
            --output .ci/godot/godot.zip
          unzip -q .ci/godot/godot.zip -d .ci/godot
          chmod +x ".ci/godot/${GODOT_BINARY}"
          curl --fail --location --retry 3 \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_export_templates.tpz" \
            --output .ci/godot/templates.tpz
          unzip -q .ci/godot/templates.tpz -d .ci/godot/templates
          mkdir -p "$HOME/.local/share/godot/export_templates/${TEMPLATE_VERSION}"
          cp .ci/godot/templates/templates/* "$HOME/.local/share/godot/export_templates/${TEMPLATE_VERSION}/"

      - name: Verify standalone project
        shell: bash
        run: |
          set -Eeuo pipefail
          chmod +x compile_and_test.sh
          GODOT_BIN="${GITHUB_WORKSPACE}/.ci/godot/${GODOT_BINARY}" ./compile_and_test.sh

      - name: Export browser playable
        shell: bash
        run: |
          set -Eeuo pipefail
          rm -rf exports/web
          mkdir -p exports/web
          ".ci/godot/${GODOT_BINARY}" --headless --path . --export-release Web exports/web/index.html
          test -f exports/web/index.html
          test -f exports/web/index.wasm
          test -f exports/web/index.pck
          touch exports/web/.nojekyll

          VERSIONED_PCK="index-${GITHUB_SHA}.pck"
          mv exports/web/index.pck "exports/web/${VERSIONED_PCK}"
          python3 - "exports/web/index.html" "${VERSIONED_PCK}" <<'PY'
          import pathlib
          import sys

          html_path = pathlib.Path(sys.argv[1])
          versioned_pck = sys.argv[2]
          html = html_path.read_text(encoding="utf-8")
          old = '"mainPack":"index.pck"'
          new = f'"mainPack":"{versioned_pck}"'
          if old not in html:
              raise SystemExit("Godot mainPack entry was not found in exported HTML")
          html_path.write_text(html.replace(old, new, 1), encoding="utf-8")
          PY

          test -f "exports/web/${VERSIONED_PCK}"
          grep -Fq "\"mainPack\":\"${VERSIONED_PCK}\"" exports/web/index.html
          ls -lh exports/web

      - name: Upload downloadable browser build
        uses: actions/upload-artifact@v4
        with:
          name: MoonGoons-Syndicate-Rising-Web
          path: exports/web/
          retention-days: 14

      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload GitHub Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: exports/web

  deploy-pages:
    if: github.event_name != 'pull_request'
    needs: build-web
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy playable game
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Record successful deployment
        uses: actions/github-script@v7
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const path = '.deployment-status.json';
            const receipt = {
              status: 'success',
              page_url: process.env.PAGE_URL,
              deployed_commit: context.sha,
              workflow_run: context.runId,
              deployed_at: new Date().toISOString()
            };
            let sha;
            try {
              const current = await github.rest.repos.getContent({ owner, repo, path, ref: 'main' });
              if (!Array.isArray(current.data)) sha = current.data.sha;
            } catch (error) {
              if (error.status !== 404) throw error;
            }
            await github.rest.repos.createOrUpdateFileContents({
              owner,
              repo,
              path,
              branch: 'main',
              message: 'Record successful Syndicate Rising deployment [skip ci]',
              content: Buffer.from(JSON.stringify(receipt, null, 2) + '\n').toString('base64'),
              sha
            });
