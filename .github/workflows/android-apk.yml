name: Syndicate Rising Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      GODOT_VERSION: 4.3-stable
      TEMPLATE_VERSION: 4.3.stable
      GODOT_BINARY: Godot_v4.3-stable_linux.x86_64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - name: Install Android packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "build-tools;34.0.0" "platforms;android-34" "cmdline-tools;latest" "cmake;3.10.2.4988404" "ndk;23.2.8568313"
      - name: Install Godot and templates
        run: |
          mkdir -p .ci/godot
          curl --fail --location --retry 3 \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip" \
            --output .ci/godot/godot.zip
          unzip -q .ci/godot/godot.zip -d .ci/godot
          chmod +x ".ci/godot/${GODOT_BINARY}"
          curl --fail --location --retry 3 \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_export_templates.tpz" \
            --output .ci/godot/templates.tpz
          unzip -q .ci/godot/templates.tpz -d .ci/godot/templates
          mkdir -p "$HOME/.local/share/godot/export_templates/${TEMPLATE_VERSION}"
          cp .ci/godot/templates/templates/* "$HOME/.local/share/godot/export_templates/${TEMPLATE_VERSION}/"
      - name: Configure Android signing
        run: |
          mkdir -p "$HOME/.android" "$HOME/.config/godot"
          keytool -genkeypair -keystore "$HOME/.android/debug.keystore" -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=MoonGoons,C=US"
          cat > "$HOME/.config/godot/editor_settings-4.tres" <<EOF
          [gd_resource type="EditorSettings" format=3]
          [resource]
          export/android/android_sdk_path = "${ANDROID_HOME}"
          export/android/java_sdk_path = "${JAVA_HOME}"
          export/android/debug_keystore = "${HOME}/.android/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          EOF
      - name: Verify project
        run: |
          chmod +x compile_and_test.sh
          GODOT_BIN="${GITHUB_WORKSPACE}/.ci/godot/${GODOT_BINARY}" ./compile_and_test.sh
      - name: Export debug APK
        run: |
          mkdir -p exports/android
          ".ci/godot/${GODOT_BINARY}" --headless --path . --export-debug Android exports/android/MoonGoons-Syndicate-Rising-debug.apk
          test -f exports/android/MoonGoons-Syndicate-Rising-debug.apk
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MoonGoons-Syndicate-Rising-Android
          path: exports/android/*.apk
          retention-days: 14
